<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kingdom Steward</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #1a5276;
        }

        .splash-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a5276 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeOut 0.5s ease-out 2s forwards;
        }

        .logo-container {
            text-align: center;
            animation: bounce 0.6s ease-out;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.2));
        }

        .app-name {
            font-family: 'Georgia', serif;
            font-size: 28px;
            letter-spacing: 3px;
            color: white;
            margin-bottom: 8px;
            font-weight: normal;
        }

        .tagline {
            font-family: Arial, sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
        }

        .loader {
            margin-top: 40px;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes bounce {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            60% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kingdom Steward">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
</head>

<body>
    <div class="splash-container" id="splash">
        <div class="logo-container">
            <img src="/assets/appstore-images/android/launchericon-192x192.png" alt="Logo" class="logo">
            <h1 class="app-name">KINGDOM STEWARD</h1>
            <p class="tagline">Faithful Giving. Smart Tracking.</p>
        </div>
        <div class="loader"></div>
    </div>

    <script>
        // Hide splash screen after load and redirect to main app
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 500);
            }, 2000);
        });
    </script>
  <script src="/js/offline.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(registration => {
            console.log('SW registered!', registration.scope);
            if ('SyncManager' in window) {
              registration.sync.register('sync-giving').catch(e => console.log('Sync reg failed', e));
            }
          })
          .catch(err => console.error('SW failed!', err));
      });
    }
    // Hide address bar on mobile
    window.addEventListener('load', () => {
      setTimeout(() => window.scrollTo(0, 1), 0);
    });
  </script>
</body>

</html>
