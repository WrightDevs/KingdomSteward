<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My Profile - Kingdom Steward</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/animations.css">
  <!-- PWA & SEO Meta Tags -->
  <meta name="description" content="Kingdom Steward - Your gateway to tracking global kingdom investments.">
  <meta name="theme-color" content="#1a5276">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/appstore-images/android/launchericon-512x512.png">
  <meta property="og:title" content="Kingdom Steward">
  <meta property="og:description" content="Track your tithes, offerings, and kingdom impact globally.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Kingdom Steward">
  <meta name="twitter:description" content="Track your tithes, offerings, and kingdom impact globally.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kingdom Steward">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="/dashboard.html" class="nav-brand">
        <img src="/assets/logo.svg" alt="Logo">
        Kingdom Steward
      </a>
      <div class="nav-links">
        <a href="/dashboard.html" class="nav-link">Dashboard</a>
        <a href="/history.html" class="nav-link">History</a>
        <a href="/pledges.html" class="nav-link">Pledges</a>
        <a href="/profile.html" class="nav-link active">Profile</a>
        <a href="/give.html" class="btn btn-accent">Log Giving</a>
      </div>
    </div>
  </nav>

  <main class="container dashboard-page" style="padding-top: 2rem;">
    <div style="max-width: 600px; margin: 0 auto;">
      <div style="text-align: center; margin-bottom: 2.5rem;">
        <div style="width: 96px; height: 96px; background: linear-gradient(135deg, var(--clr-primary-light) 0%, #ffffff 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; border: 3px solid white; box-shadow: var(--shadow-lg);">
          <i data-lucide="user" style="color: var(--clr-primary); width: 48px; height: 48px;"></i>
        </div>
        <h1 style="font-size: 1.75rem; font-family: var(--font-display); color: var(--clr-primary); margin-bottom: 0.25rem; font-weight: 700;">My Profile</h1>
        <p style="color: var(--clr-muted); font-size: 0.95rem;">Manage your personal and ministry details</p>
      </div>
      
      <form id="profile-form">
        
        <!-- Account Details Card -->
        <div class="card" style="margin-bottom: 1.5rem; padding: 2rem;">
          <h3 style="font-size: 1.1rem; margin-bottom: 1.5rem; color: var(--clr-primary); border-bottom: 1px solid var(--clr-border); padding-bottom: 0.75rem; font-family: var(--font-body); font-weight: 700;">Account Details</h3>
          
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" class="form-input" disabled style="background-color: var(--clr-bg); color: var(--clr-muted); cursor: not-allowed; opacity: 0.8; border-color: transparent;">
          </div>
          
          <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 1.25rem;">
            <div class="form-group">
              <label for="title" class="form-label">Title</label>
              <select id="title" class="form-select" required>
                <option value="" disabled>Select</option>
                <option value="Brother">Brother</option>
                <option value="Sister">Sister</option>
                <option value="Pastor">Pastor</option>
                <option value="Deacon">Deacon</option>
                <option value="Deaconess">Deaconess</option>
                <option value="Cell Leader">Cell Leader</option>
                <option value="Zonal Manager">Zonal Manager</option>
                <option value="Zonal Secretary">Zonal Secretary</option>
                <option value="Zonal Pastor">Zonal Pastor</option>
                <option value="Regional Secretary">Regional Secretary</option>
                <option value="CEO">CEO</option>
                <option value="Reverend">Reverend</option>
              </select>
            </div>
            
            <div class="form-group">
              <label for="fullName" class="form-label">Full Name</label>
              <input type="text" id="fullName" class="form-input" required>
            </div>
          </div>
        </div>
        
        <!-- Ministry Details Card -->
        <div class="card" style="margin-bottom: 2.5rem; padding: 2rem;">
          <h3 style="font-size: 1.1rem; margin-bottom: 1.5rem; color: var(--clr-primary); border-bottom: 1px solid var(--clr-border); padding-bottom: 0.75rem; font-family: var(--font-body); font-weight: 700;">Ministry Details</h3>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem;">
            <div class="form-group">
              <label for="zone" class="form-label">Zone</label>
              <select id="zone" class="form-select" required>
                <option value="" disabled selected>Select Zone</option>
              </select>
            </div>
            
            <div class="form-group">
              <label for="church" class="form-label">Local Church</label>
              <select id="church" class="form-select" required>
                <option value="" disabled selected>Select Church</option>
              </select>
            </div>
          </div>
        </div>
        
        <!-- Action Buttons -->
        <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 4rem;">
          <button type="submit" class="btn btn-primary" id="submit-btn" style="width: 100%; padding: 0.85rem; font-size: 1.05rem; justify-content: center; box-shadow: var(--shadow-lg);">
            <i data-lucide="save" style="width: 18px; height: 18px; margin-right: 0.25rem;"></i> Save Changes
          </button>
          
          <button type="button" id="logout-btn" class="btn" style="width: 100%; padding: 0.85rem; font-size: 1.05rem; justify-content: center; border: 2px solid #ef4444; color: #ef4444; background: transparent;">
            <i data-lucide="log-out" style="width: 18px; height: 18px; margin-right: 0.25rem;"></i> Log Out
          </button>
        </div>
      </form>
    </div>
  </main>

  <!-- Mobile Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="/dashboard.html" class="bottom-nav-item">
        <i data-lucide="layout-dashboard"></i>
        <span>Home</span>
      </a>
      <a href="/history.html" class="bottom-nav-item">
        <i data-lucide="history"></i>
        <span>History</span>
      </a>
      <a href="/give.html" class="bottom-nav-fab">
        <i data-lucide="plus"></i>
      </a>
      <a href="/pledges.html" class="bottom-nav-item">
        <i data-lucide="calendar-clock"></i>
        <span>Pledges</span>
      </a>
      <a href="/profile.html" class="bottom-nav-item active">
        <i data-lucide="user"></i>
        <span>Profile</span>
      </a>
    </div>
  </nav>

  <!-- Toast Container -->
  <div id="toast-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 1001;"></div>

  <!-- CDN Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
  
  <!-- App scripts -->
  <script src="/js/config.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/zones.js"></script>
  <script src="/js/profile.js"></script>
  <script>
    document.getElementById('logout-btn').addEventListener('click', async () => {
      try {
        await signOut();
      } catch (error) {
        console.error('Error logging out:', error);
      }
    });
  </script>
  
  <script src="/js/offline.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(registration => {
            console.log('SW registered!', registration.scope);
            if ('SyncManager' in window) {
              registration.sync.register('sync-giving').catch(e => console.log('Sync reg failed', e));
            }
          })
          .catch(err => console.error('SW failed!', err));
      });
    }
    // Hide address bar on mobile
    window.addEventListener('load', () => {
      setTimeout(() => window.scrollTo(0, 1), 0);
    });
  </script>
</body>
</html>
