<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Giving - Kingdom Steward</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <style>
    .give-page {
      padding: 2rem 0 4rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .espees-preview-container {
      background-color: var(--clr-primary-light);
      border-radius: var(--radius-sm);
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 2rem;
      border: 1px solid var(--clr-primary);
    }
    .espees-label {
      color: var(--clr-primary-hover);
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .espees-value {
      font-family: var(--font-display);
      font-size: 3rem;
      color: var(--clr-primary);
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="/dashboard.html" class="nav-brand">
        <img src="/assets/logo.svg" alt="Logo">
        Kingdom Steward
      </a>
      <div class="nav-links">
        <a href="/dashboard.html" class="nav-link">Dashboard</a>
        <a href="/history.html" class="nav-link">History</a>
        <a href="/pledges.html" class="nav-link">Pledges</a>
        <a href="/profile.html" class="nav-link">Profile</a>
      </div>
    </div>
  </nav>

  <main class="container give-page">
    <h1 style="margin-bottom: 0.5rem;">Log Giving</h1>
    <p style="color: var(--clr-muted); margin-bottom: 2rem;">Enter your giving details. The Espees value updates automatically.</p>

    <div class="card">
      <div class="espees-preview-container">
        <div class="espees-label">Espees Equivalent</div>
        <div class="espees-value espees-preview" id="espees-preview">0 Esp</div>
      </div>

      <form id="give-form">
        <div class="form-group">
          <label for="amount" class="form-label">Amount (NGN)</label>
          <input type="number" id="amount" class="form-input" required min="1" step="0.01" placeholder="e.g. 50000">
        </div>
        
        <div class="form-group">
          <label for="type" class="form-label">Giving Category / Ministry Arm</label>
          <select id="type" class="form-select" required>
            <option value="tithe">Tithe</option>
            <option value="offering">Offering</option>
            <option value="first_fruit">First Fruit</option>
            <option value="seed">Seed</option>
            <option value="rhapsody_of_realities">Rhapsody of Realities</option>
            <option value="rhapathon">Rhapathon</option>
            <option value="healing_school">Healing School</option>
            <option value="innercity_mission">InnerCity Mission</option>
            <option value="loveworld_tv">LoveWorld TV Ministry</option>
            <option value="campus_ministry">Campus Ministry</option>
            <option value="other">Other</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="date" class="form-label">Date</label>
          <input type="date" id="date" class="form-input" required>
        </div>
        
        <div class="form-group">
          <label for="notes" class="form-label">Notes (Optional)</label>
          <textarea id="notes" class="form-input" rows="3" placeholder="Any specific details..."></textarea>
        </div>
        
        <p id="error-msg" class="form-error"></p>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
          <a href="/dashboard.html" class="btn btn-outline" style="flex: 1;">Cancel</a>
          <button type="submit" class="btn btn-primary" id="submit-btn" style="flex: 2;">Save Entry</button>
        </div>
      </form>
    </div>
  </main>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Mobile Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="/dashboard.html" class="bottom-nav-item">
        <i data-lucide="layout-dashboard"></i>
        <span>Home</span>
      </a>
      <a href="/history.html" class="bottom-nav-item">
        <i data-lucide="history"></i>
        <span>History</span>
      </a>
      <a href="/give.html" class="bottom-nav-fab" style="border-color: var(--clr-primary-light);">
        <i data-lucide="plus"></i>
      </a>
      <a href="/pledges.html" class="bottom-nav-item">
        <i data-lucide="calendar-clock"></i>
        <span>Pledges</span>
      </a>
      <a href="/profile.html" class="bottom-nav-item">
        <i data-lucide="user"></i>
        <span>Profile</span>
      </a>
    </div>
  </nav>

  <!-- CDN Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
  
  <!-- App scripts -->
  <script src="/js/config.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/espees.js"></script>
  <script src="/js/giving.js"></script>
  
  <script>
    async function initGivePage() {
      await requireAuth();
      
      // Default date to today
      document.getElementById('date').value = new Date().toISOString().split('T')[0];
      
      const amountInput = document.getElementById('amount');
      const espeesPreview = document.getElementById('espees-preview');
      
      // Live Espees preview
      amountInput.addEventListener('input', () => {
        const val = parseFloat(amountInput.value) || 0;
        espeesPreview.textContent = formatEspees(val);
        
        // Add tiny pop animation
        espeesPreview.classList.add('updating');
        setTimeout(() => espeesPreview.classList.remove('updating'), 200);
      });
      
      // Form submission
      const form = document.getElementById('give-form');
      const errorMsg = document.getElementById('error-msg');
      const submitBtn = document.getElementById('submit-btn');
      
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;
        const date = document.getElementById('date').value;
        const notes = document.getElementById('notes').value;
        
        errorMsg.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Saving...';
        
        try {
          await createGiving({ amount, type, date, notes });
          
          // Show toast
          showToast('Giving entry saved successfully!');
          
          // Redirect after a short delay
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1500);
          
        } catch (error) {
          console.error(error);
          errorMsg.innerHTML = "<strong>Error:</strong> " + (error.message || "Failed to save entry. Make sure you have run the latest Supabase schema update.");
          errorMsg.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Save Entry';
        }
      });
    }
    
    function showToast(message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<i data-lucide="check-circle" style="color: var(--clr-primary);"></i> <span>${message}</span>`;
      container.appendChild(toast);
      lucide.createIcons();
      
      setTimeout(() => {
        toast.classList.add('fade-out');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
    
    document.addEventListener('DOMContentLoaded', initGivePage);
  </script>
</body>
</html>
