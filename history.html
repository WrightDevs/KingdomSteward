<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History - Kingdom Steward</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/animations.css">
  <!-- PWA & SEO Meta Tags -->
  <meta name="description" content="Kingdom Steward - Your gateway to tracking global kingdom investments.">
  <meta name="theme-color" content="#0A2540">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/appstore-images/android/launchericon-512x512.png">
  <meta property="og:title" content="Kingdom Steward">
  <meta property="og:description" content="Track your tithes, offerings, and kingdom impact globally.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Kingdom Steward">
  <meta name="twitter:description" content="Track your tithes, offerings, and kingdom impact globally.">
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="/dashboard.html" class="nav-brand">
        <img src="/assets/logo.svg" alt="Logo">
        Kingdom Steward
      </a>
      <div class="nav-links">
        <a href="/dashboard.html" class="nav-link">Dashboard</a>
        <a href="/history.html" class="nav-link active">History</a>
        <a href="/pledges.html" class="nav-link">Pledges</a>
        <a href="/profile.html" class="nav-link">Profile</a>
        <a href="/give.html" class="btn btn-accent">Log Giving</a>
      </div>
    </div>
  </nav>

  <main class="container dashboard-page">
    <div class="dashboard-header" style="margin-bottom: 1.5rem;">
      <div>
        <h1>Giving History</h1>
        <p>A complete record of your spiritual investments.</p>
      </div>
    </div>

    <style>
      @media print {
        .navbar, .bottom-nav, .history-actions, .btn {
          display: none !important;
        }
        body {
          background-color: white;
        }
        .card {
          box-shadow: none;
          border: none;
        }
        .recent-entries th {
          background-color: #f1f5f9 !important;
          -webkit-print-color-adjust: exact;
        }
      }
    </style>
    
    <div class="card recent-card">
      <div class="history-actions" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem;">
        <div>
          <label for="type-filter" style="font-weight: 600; font-size: 0.95rem; color: var(--clr-primary); margin-right: 0.5rem;">Filter by Ministry Arm:</label>
          <select id="type-filter" class="form-select" style="display: inline-block; width: auto;">
            <option value="all">All Types</option>
            <option value="tithe">Tithe</option>
            <option value="offering">Offering</option>
            <option value="first_fruit">First Fruit</option>
            <option value="seed">Seed</option>
            <option value="rhapsody_of_realities">Rhapsody of Realities</option>
            <option value="rhapathon">Rhapathon</option>
            <option value="healing_school">Healing School</option>
            <option value="innercity_mission">InnerCity Mission</option>
            <option value="loveworld_tv">LoveWorld TV Ministry</option>
            <option value="campus_ministry">Campus Ministry</option>
            <option value="other">Other</option>
          </select>
        </div>
        <button onclick="window.print()" class="btn btn-outline" style="padding: 0.4rem 1rem;">
          <i data-lucide="printer" style="width: 16px; height: 16px;"></i> Export to PDF
        </button>
      </div>

      <div style="overflow-x: auto;">
        <table class="recent-entries">
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Amount (NGN)</th>
              <th>Espees</th>
              <th style="text-align: right;">Action</th>
            </tr>
          </thead>
          <tbody id="history-table-body">
            <tr>
              <td><div class="skeleton skeleton-text short"></div></td>
              <td><div class="skeleton skeleton-text"></div></td>
              <td><div class="skeleton skeleton-text short"></div></td>
              <td><div class="skeleton skeleton-text short"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 40px; margin-left: auto;"></div></td>
            </tr>
            <tr>
              <td><div class="skeleton skeleton-text short"></div></td>
              <td><div class="skeleton skeleton-text"></div></td>
              <td><div class="skeleton skeleton-text short"></div></td>
              <td><div class="skeleton skeleton-text short"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 40px; margin-left: auto;"></div></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
  
  <!-- Toast Container is created dynamically in history.js if needed -->

  <!-- Mobile Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="/dashboard.html" class="bottom-nav-item">
        <i data-lucide="layout-dashboard"></i>
        <span>Home</span>
      </a>
      <a href="/history.html" class="bottom-nav-item active">
        <i data-lucide="history"></i>
        <span>History</span>
      </a>
      <a href="/give.html" class="bottom-nav-fab">
        <i data-lucide="plus"></i>
      </a>
      <a href="/pledges.html" class="bottom-nav-item">
        <i data-lucide="calendar-clock"></i>
        <span>Pledges</span>
      </a>
      <a href="/profile.html" class="bottom-nav-item">
        <i data-lucide="user"></i>
        <span>Profile</span>
      </a>
    </div>
  </nav>

  <!-- CDN Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
  
  <!-- App scripts -->
  <script src="/js/config.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/espees.js"></script>
  <script src="/js/giving.js"></script>
  <script src="/js/history.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(reg => console.log('SW registered!', reg))
          .catch(err => console.error('SW failed!', err));
      });
    }
  </script>
</body>
</html>
