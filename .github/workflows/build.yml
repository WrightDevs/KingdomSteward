name: Build TWA APK
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Everything (No Questions Asked)
        run: |
          # Update and install JDK silently
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq openjdk-17-jdk curl wget git unzip
          
          # Install Node.js and npm
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y -qq nodejs
          
          # Install Bubblewrap
          npm install -g @bubblewrap/cli
          
      - name: Setup Android SDK (Silent Mode)
        run: |
          # Download Android command line tools silently
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p /opt/android-sdk/cmdline-tools
          mv cmdline-tools /opt/android-sdk/cmdline-tools/latest
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          
          # Accept licenses silently
          yes | sdkmanager --licenses > /dev/null 2>&1
          
      - name: Build TWA
        run: |
          # Create TWA project
          mkdir -p twa-project
          cd twa-project
          bubblewrap init --manifest https://kistew.vercel.app/manifest.json --non-interactive
          
          # Build APK
          bubblewrap build
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: twa-apk
          path: twa-project/app/build/outputs/apk/
